<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Battle City</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  user-select: none;
  overflow: hidden;
}
.game-wrapper {
  background: #16213e;
  padding: 30px 40px;
  border-radius: 16px;
  box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 80px rgba(0,100,200,0.15);
  border: 1px solid rgba(255,255,255,0.05);
}
.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  color: #fff;
  font-size: 14px;
}
.game-header .title {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: 4px;
  background: linear-gradient(90deg, #f7971e, #ffd200);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: none;
}
.game-header .stats span {
  margin-left: 20px;
  color: #a8d8ea;
}
.game-header .stats span em {
  font-style: normal;
  color: #ffd700;
  font-weight: 700;
}
canvas {
  display: block;
  border: 3px solid #0f3460;
  border-radius: 4px;
  background: #000;
  image-rendering: pixelated;
}
.game-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  color: #8899aa;
  font-size: 13px;
}
.game-footer button {
  background: #0f3460;
  border: none;
  color: #a8d8ea;
  padding: 8px 24px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
}
.game-footer button:hover {
  background: #1a5276;
  color: #fff;
  transform: translateY(-1px);
}
.controls-hint {
  color: #667788;
  font-size: 12px;
}
@media (max-width: 700px) {
  .game-wrapper { padding: 16px; }
  .game-header .title { font-size: 16px; }
  .game-header .stats span { margin-left: 10px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-header">
    <div class="title">⚔ 坦克大战</div>
    <div class="stats">
      <span>🏆 得分 <em id="scoreDisplay">0</em></span>
      <span>❤️ 生命 <em id="livesDisplay">3</em></span>
      <span>👾 敌人 <em id="enemiesDisplay">20</em></span>
    </div>
  </div>
  <canvas id="gameCanvas" width="520" height="520" tabindex="-1"></canvas>
  <div class="game-footer">
    <div class="controls-hint">↑↓←→ 移动 &nbsp;|&nbsp; 空格 射击 &nbsp;|&nbsp; P 暂停</div>
    <button id="restartBtn">重新开始</button>
  </div>
</div>

<script>
// ============================================================
//  GAME CONSTANTS
// ============================================================
const COLS = 26;
const ROWS = 26;
const CELL = 20;
const W = COLS * CELL;  // 520
const H = ROWS * CELL;  // 520

const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

const TANK_SIZE = 36;       // tank visual size (px)
const TANK_SPEED = 1.8;     // pixels per frame
const BULLET_SPEED = 4;
const BULLET_SIZE = 6;
const MAX_BULLETS = 1;
const MAX_ENEMIES = 4;
const TOTAL_ENEMIES = 20;
const SPAWN_DELAY = 180;    // frames between enemy spawns
const INVINCIBLE_FRAMES = 120;

// ============================================================
//  CANVAS SETUP
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreSpan = document.getElementById('scoreDisplay');
const livesSpan = document.getElementById('livesDisplay');
const enemiesSpan = document.getElementById('enemiesDisplay');

// ============================================================
//  GAME STATE
// ============================================================
let map = [];          // 0=empty, 1=brick, 2=steel, 3=base
let player = null;
let enemies = [];
let bullets = [];
let explosions = [];
let particles = [];

let score = 0;
let lives = 3;
let enemiesRemaining = TOTAL_ENEMIES;
let spawnTimer = 0;
let gameOver = false;
let gamePaused = false;
let gameWin = false;
let gameStarted = false;
let frameCount = 0;
let keys = {};
let base = { row: 24, col: 12 };  // base position (2x2 block)

// ============================================================
//  MAP GENERATION
// ============================================================
function initMap() {
  map = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      map[r][c] = 0;
    }
  }

  // Brick walls around base
  const br = base.row, bc = base.col;
  for (let dr = 0; dr < 2; dr++) {
    for (let dc = -1; dc <= 2; dc++) {
      if (dc === 0 || dc === 1) continue; // leave base opening
      map[br - 2 + dr][bc + dc] = 1;
    }
  }
  // Close top of base
  for (let dc = -1; dc <= 2; dc++) {
    map[br - 4][bc + dc] = 1;
  }

  // Brick clusters throughout the map
  const brickPatterns = [
    // Top area
    [3, 2], [3, 3], [3, 6], [3, 7], [3, 16], [3, 17], [3, 20], [3, 21],
    [3, 10], [3, 11], [3, 12], [3, 13], [3, 14], [3, 15],
    [5, 2], [5, 3], [5, 6], [5, 7], [5, 16], [5, 17], [5, 20], [5, 21],
    [5, 10], [5, 11], [5, 12], [5, 13], [5, 14], [5, 15],
    // Middle area
    [9, 2], [9, 3], [9, 10], [9, 11], [9, 14], [9, 15], [9, 22], [9, 23],
    [11, 2], [11, 3], [11, 10], [11, 11], [11, 14], [11, 15], [11, 22], [11, 23],
    [13, 2], [13, 3], [13, 10], [13, 11], [13, 14], [13, 15], [13, 22], [13, 23],
    [15, 2], [15, 3], [15, 10], [15, 11], [15, 14], [15, 15], [15, 22], [15, 23],
    // Bottom area
    [19, 2], [19, 3], [19, 6], [19, 7], [19, 16], [19, 17], [19, 22], [19, 23],
    [21, 2], [21, 3], [21, 6], [21, 7], [21, 16], [21, 17], [21, 22], [21, 23],
  ];
  for (const [r, c] of brickPatterns) {
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) map[r][c] = 1;
  }

  // Steel walls (indestructible)
  const steelPositions = [
    [1, 12], [1, 13],
    [7, 6], [7, 7], [7, 18], [7, 19],
    [17, 6], [17, 7], [17, 18], [17, 19],
  ];
  for (const [r, c] of steelPositions) {
    if (r >= 0 && r < ROWS && c >= 0 && c < COLS) map[r][c] = 2;
  }

  // Place base (eagle)
  map[br][bc] = 3;
  map[br][bc + 1] = 3;
  map[br + 1][bc] = 3;
  map[br + 1][bc + 1] = 3;
}

// ============================================================
//  ENTITY CLASSES
// ============================================================
class Tank {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.isPlayer = isPlayer;
    this.size = TANK_SIZE;
    this.speed = isPlayer ? TANK_SPEED : TANK_SPEED * 0.6;
    this.half = this.size / 2;
    this.alive = true;
    this.cooldown = 0;
    this.invincible = 0;
    this.moveTimer = 0;
    this.shootTimer = 0;
    this.decisionTimer = 60 + Math.random() * 120;
    this.color = isPlayer ? '#f5a623' : '#e74c3c';
    this.turretColor = isPlayer ? '#f7c948' : '#c0392b';
    this.trackColor = isPlayer ? '#d4891a' : '#a93226';
  }

  get cx() { return this.x + this.half; }
  get cy() { return this.y + this.half; }
  get gridCol() { return Math.floor((this.x + this.half) / CELL); }
  get gridRow() { return Math.floor((this.y + this.half) / CELL); }

  canMove(nx, ny) {
    // Bounds check
    if (nx < 0 || ny < 0 || nx + this.size > W || ny + this.size > H) return false;

    // Collision with walls / base
    const margin = 2;
    const left = nx + margin, right = nx + this.size - margin;
    const top = ny + margin, bottom = ny + this.size - margin;
    const c1 = Math.floor(left / CELL);
    const c2 = Math.floor(right / CELL);
    const r1 = Math.floor(top / CELL);
    const r2 = Math.floor(bottom / CELL);

    for (let r = r1; r <= r2; r++) {
      for (let c = c1; c <= c2; c++) {
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
        if (map[r][c] !== 0) return false;
      }
    }

    // Collision with other tanks
    const allTanks = this.isPlayer ? enemies : [...enemies, player].filter(t => t && t !== this && t.alive);
    for (const t of allTanks) {
      if (!t.alive) continue;
      if (nx < t.x + t.size && nx + this.size > t.x &&
          ny < t.y + t.size && ny + this.size > t.y) {
        return false;
      }
    }
    return true;
  }

  move(dir) {
    if (!this.alive) return;
    this.dir = dir;
    const nx = this.x + DX[dir] * this.speed;
    const ny = this.y + DY[dir] * this.speed;
    if (this.canMove(nx, ny)) {
      this.x = nx;
      this.y = ny;
    }
  }

  shoot() {
    if (!this.alive || this.cooldown > 0) return null;
    // Check bullet limit for player
    if (this.isPlayer) {
      const playerBullets = bullets.filter(b => b.isPlayer);
      if (playerBullets.length >= MAX_BULLETS) return null;
    }
    this.cooldown = this.isPlayer ? 20 : 40;
    const bx = this.cx + DX[this.dir] * (this.half + 2) - BULLET_SIZE / 2;
    const by = this.cy + DY[this.dir] * (this.half + 2) - BULLET_SIZE / 2;
    const b = new Bullet(bx, by, this.dir, this.isPlayer);
    bullets.push(b);
    return b;
  }

  update() {
    if (!this.alive) return;
    if (this.cooldown > 0) this.cooldown--;
    if (this.invincible > 0) this.invincible--;
  }

  draw() {
    if (!this.alive) return;
    const s = this.size;
    const cx = this.x, cy = this.y;

    // Tracks (two rectangles on sides depending on direction)
    ctx.save();
    ctx.translate(cx + s/2, cy + s/2);
    ctx.rotate(this.dir * Math.PI / 2);
    ctx.translate(-s/2, -s/2);

    // Tracks
    ctx.fillStyle = this.trackColor;
    ctx.fillRect(2, 0, 6, s);
    ctx.fillRect(s - 8, 0, 6, s);

    // Body
    ctx.fillStyle = this.color;
    ctx.fillRect(6, 3, s - 12, s - 6);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(6, 3, s - 12, s - 6);

    // Turret base (circle)
    ctx.fillStyle = this.turretColor;
    ctx.beginPath();
    ctx.arc(s/2, s/2, 7, 0, Math.PI * 2);
    ctx.fill();

    // Barrel
    ctx.fillStyle = this.turretColor;
    ctx.fillRect(s/2 - 2, 2, 4, s/2 - 4);

    ctx.restore();

    // Invincibility flash
    if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) {
      ctx.save();
      ctx.globalAlpha = 0.35;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(this.cx, this.cy, s/2 + 2, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  getRect() {
    return { x: this.x, y: this.y, w: this.size, h: this.size };
  }
}

class Bullet {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.isPlayer = isPlayer;
    this.size = BULLET_SIZE;
    this.speed = BULLET_SPEED;
    this.alive = true;
    this.half = this.size / 2;
  }

  update() {
    if (!this.alive) return;
    this.x += DX[this.dir] * this.speed;
    this.y += DY[this.dir] * this.speed;

    // Out of bounds
    if (this.x < 0 || this.y < 0 || this.x + this.size > W || this.y + this.size > H) {
      this.alive = false;
      spawnExplosion(this.x + this.half, this.y + this.half, '#aaa', 4);
      return;
    }

    // Check wall collision
    const cx = this.x + this.half;
    const cy = this.y + this.half;
    const col = Math.floor(cx / CELL);
    const row = Math.floor(cy / CELL);

    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      const cell = map[row][col];
      if (cell === 1) { // brick
        map[row][col] = 0;
        this.alive = false;
        spawnExplosion(cx, cy, '#c8a45c', 8);
        spawnParticles(cx, cy, '#b8860b', 6);
        return;
      } else if (cell === 2) { // steel
        this.alive = false;
        spawnExplosion(cx, cy, '#88aacc', 6);
        spawnParticles(cx, cy, '#aaccee', 4);
        return;
      } else if (cell === 3) { // base hit!
        map[row][col] = 0;
        map[row+1][col] = 0;
        map[row][col+1] = 0;
        map[row+1][col+1] = 0;
        this.alive = false;
        spawnExplosion(cx, cy, '#ff4444', 20);
        triggerGameOver();
        return;
      }
    }

    // Check tank collision
    if (this.isPlayer) {
      for (const e of enemies) {
        if (!e.alive) continue;
        if (this.x < e.x + e.size && this.x + this.size > e.x &&
            this.y < e.y + e.size && this.y + this.size > e.y) {
          this.alive = false;
          e.alive = false;
          score += 100;
          spawnExplosion(e.cx, e.cy, '#ff6b35', 16);
          spawnParticles(e.cx, e.cy, '#ff4444', 10);
          updateUI();
          return;
        }
      }
    } else {
      if (player && player.alive && player.invincible <= 0) {
        if (this.x < player.x + player.size && this.x + this.size > player.x &&
            this.y < player.y + player.size && this.y + this.size > player.y) {
          this.alive = false;
          playerDie();
          return;
        }
      }
    }
  }

  draw() {
    if (!this.alive) return;
    ctx.save();
    ctx.shadowColor = this.isPlayer ? '#ffd700' : '#ff4444';
    ctx.shadowBlur = 6;
    ctx.fillStyle = this.isPlayer ? '#ffd700' : '#ff6666';
    ctx.fillRect(this.x, this.y, this.size, this.size);
    ctx.restore();
  }
}

// ============================================================
//  EFFECTS
// ============================================================
function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    explosions.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * 15,
      maxLife: 35,
      color: color,
      size: 3 + Math.random() * 5
    });
  }
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 2.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 15 + Math.random() * 10,
      maxLife: 25,
      color: color,
      size: 2 + Math.random() * 3
    });
  }
}

function updateEffects(arr) {
  for (let i = arr.length - 1; i >= 0; i--) {
    const e = arr[i];
    e.x += e.vx;
    e.y += e.vy;
    e.vx *= 0.95;
    e.vy *= 0.95;
    e.life--;
    if (e.life <= 0) {
      arr.splice(i, 1);
    }
  }
}

function drawEffects(arr) {
  for (const e of arr) {
    const alpha = e.life / e.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================================
//  PLAYER FUNCTIONS
// ============================================================
function spawnPlayer() {
  const px = 9 * CELL;
  const py = 24 * CELL;
  player = new Tank(px, py, DIR.UP, true);
  player.invincible = INVINCIBLE_FRAMES;
}

function playerDie() {
  if (!player || !player.alive) return;
  player.alive = false;
  lives--;
  spawnExplosion(player.cx, player.cy, '#ffd700', 20);
  updateUI();
  if (lives <= 0) {
    triggerGameOver();
  } else {
    // Respawn after delay
    setTimeout(() => {
      if (!gameOver) {
        spawnPlayer();
      }
    }, 1500);
  }
}

// ============================================================
//  ENEMY AI
// ============================================================
function updateEnemyAI(enemy) {
  if (!enemy.alive) return;

  enemy.decisionTimer--;
  if (enemy.decisionTimer <= 0) {
    // Random direction or keep current
    if (Math.random() < 0.3) {
      // Keep direction
    } else {
      enemy.dir = Math.floor(Math.random() * 4);
    }
    enemy.decisionTimer = 40 + Math.random() * 100;
  }

  // Try to move, if blocked change direction
  const nx = enemy.x + DX[enemy.dir] * enemy.speed;
  const ny = enemy.y + DY[enemy.dir] * enemy.speed;
  if (!enemy.canMove(nx, ny)) {
    enemy.dir = Math.floor(Math.random() * 4);
  }
  enemy.move(enemy.dir);

  // Random shooting
  enemy.shootTimer--;
  if (enemy.shootTimer <= 0) {
    enemy.shoot();
    enemy.shootTimer = 30 + Math.random() * 80;
  }
}

// ============================================================
//  SPAWN ENEMIES
// ============================================================
const SPAWN_POINTS = [
  { x: 0 * CELL, y: 0 * CELL },
  { x: 12 * CELL, y: 0 * CELL },
  { x: 24 * CELL, y: 0 * CELL },
];

function spawnEnemy() {
  if (enemiesRemaining <= 0 || enemies.length >= MAX_ENEMIES) return;
  if (gameOver || gameWin) return;

  // Pick spawn point that isn't blocked
  const shuffled = [...SPAWN_POINTS].sort(() => Math.random() - 0.5);
  for (const sp of shuffled) {
    const tempTank = new Tank(sp.x, sp.y, DIR.DOWN, false);
    // Check if spawn area is clear
    let blocked = false;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (Math.abs(e.x - sp.x) < TANK_SIZE + 4 && Math.abs(e.y - sp.y) < TANK_SIZE + 4) {
        blocked = true;
        break;
      }
    }
    if (!blocked) {
      const enemy = new Tank(sp.x, sp.y, DIR.DOWN, false);
      enemy.invincible = 60;
      enemies.push(enemy);
      enemiesRemaining--;
      updateUI();
      return;
    }
  }
}

// ============================================================
//  GAME STATE FUNCTIONS
// ============================================================
function triggerGameOver() {
  if (gameOver) return;
  gameOver = true;
  // Massive explosion at base
  spawnExplosion((base.col + 0.5) * CELL, (base.row + 0.5) * CELL, '#ff0000', 30);
  setTimeout(() => {
    spawnExplosion((base.col + 0.5) * CELL, (base.row + 1) * CELL, '#ff4400', 20);
  }, 200);
}

function triggerWin() {
  gameWin = true;
}

function resetGame() {
  gameOver = false;
  gameWin = false;
  gamePaused = false;
  gameStarted = false;
  score = 0;
  lives = 3;
  enemiesRemaining = TOTAL_ENEMIES;
  enemies = [];
  bullets = [];
  explosions = [];
  particles = [];
  spawnTimer = SPAWN_DELAY;
  frameCount = 0;

  initMap();
  spawnPlayer();
  updateUI();
}

function startGame() {
  if (gameStarted) return;
  gameStarted = true;
  spawnTimer = SPAWN_DELAY / 2; // brief pause before first enemy
}

function updateUI() {
  scoreSpan.textContent = score;
  livesSpan.textContent = lives;
  enemiesSpan.textContent = enemiesRemaining + enemies.length;
}

// ============================================================
//  DRAWING
// ============================================================
function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * CELL, y = r * CELL;
      const cell = map[r][c];
      if (cell === 1) {
        // Brick wall
        ctx.fillStyle = '#c8a45c';
        ctx.fillRect(x, y, CELL, CELL);
        // Brick pattern
        ctx.strokeStyle = '#a08040';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, CELL, CELL);
        ctx.beginPath();
        ctx.moveTo(x, y + CELL/2);
        ctx.lineTo(x + CELL, y + CELL/2);
        ctx.moveTo(x + CELL/2, y);
        ctx.lineTo(x + CELL/2, y + CELL/2);
        ctx.stroke();
      } else if (cell === 2) {
        // Steel wall
        ctx.fillStyle = '#8899aa';
        ctx.fillRect(x, y, CELL, CELL);
        ctx.strokeStyle = '#aabbcc';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 1, y + 1, CELL - 2, CELL - 2);
        // Rivets
        ctx.fillStyle = '#667788';
        const rivets = [[3,3],[3,CELL-3],[CELL-3,3],[CELL-3,CELL-3]];
        for (const [rx, ry] of rivets) {
          ctx.beginPath();
          ctx.arc(x + rx, y + ry, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (cell === 3) {
        // Base (eagle)
        drawEagle(x, y);
      }
    }
  }
}

function drawEagle(x, y) {
  const s = CELL * 2;
  // Background glow
  const grad = ctx.createRadialGradient(x + s/2, y + s/2, 0, x + s/2, y + s/2, s);
  grad.addColorStop(0, 'rgba(255,200,50,0.15)');
  grad.addColorStop(1, 'rgba(255,200,50,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(x - 4, y - 4, s + 8, s + 8);

  // Eagle body (simplified)
  const half = CELL;
  ctx.fillStyle = '#ffd700';
  ctx.strokeStyle = '#cc9900';
  ctx.lineWidth = 2;

  // Body
  ctx.beginPath();
  ctx.moveTo(x + half, y + 2);
  ctx.lineTo(x + half - 6, y + half - 2);
  ctx.lineTo(x + half + 6, y + half - 2);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Wings
  ctx.beginPath();
  ctx.moveTo(x + 2, y + half + 2);
  ctx.lineTo(x + half, y + half - 4);
  ctx.lineTo(x + s - 2, y + half + 2);
  ctx.lineTo(x + half + 4, y + half + 8);
  ctx.lineTo(x + half - 4, y + half + 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Star / symbol
  ctx.fillStyle = '#cc9900';
  ctx.beginPath();
  ctx.arc(x + half, y + half - 2, 3, 0, Math.PI * 2);
  ctx.fill();
}

function drawHUD() {
  // Draw a dark border line around the game area
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(0, 0, W, H);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 40px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#e74c3c';
  ctx.fillText('GAME OVER', W/2, H/2 - 30);

  ctx.font = '18px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.fillText('得分: ' + score, W/2, H/2 + 30);

  ctx.font = '14px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#667';
  ctx.fillText('点击「重新开始」再来一局', W/2, H/2 + 70);
}

function drawWin() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 40px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('胜利!', W/2, H/2 - 30);

  ctx.font = '18px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#aaa';
  ctx.fillText('全部消灭! 得分: ' + score, W/2, H/2 + 30);

  ctx.font = '14px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#667';
  ctx.fillText('点击「重新开始」再来一局', W/2, H/2 + 70);
}

function drawPause() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 36px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText('暂停', W/2, H/2);

  ctx.font = '14px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#889';
  ctx.fillText('按 P 继续', W/2, H/2 + 40);
}

function drawStartScreen() {
  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Grid lines (decorative)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      ctx.strokeRect(i * CELL, j * CELL, CELL, CELL);
    }
  }

  // Title shadow
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 56px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText('坦克大战', W/2 + 3, H/2 - 90 + 3);

  // Title gradient
  const grad = ctx.createLinearGradient(W/2 - 120, H/2 - 130, W/2 + 120, H/2 - 50);
  grad.addColorStop(0, '#f7971e');
  grad.addColorStop(0.5, '#ffd200');
  grad.addColorStop(1, '#f7971e');
  ctx.font = 'bold 56px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = grad;
  ctx.fillText('坦克大战', W/2, H/2 - 90);

  // Subtitle
  ctx.font = '16px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#8899aa';
  ctx.fillText('BATTLE CITY', W/2, H/2 - 38);

  // Decorative tanks
  const drawMiniTank = (x, y, facingRight) => {
    ctx.fillStyle = facingRight ? '#e74c3c' : '#f5a623';
    ctx.fillRect(x, y + 4, 20, 12);
    ctx.fillStyle = facingRight ? '#c0392b' : '#d4891a';
    ctx.fillRect(x + (facingRight ? 14 : 0), y + 6, 6, 8);
    ctx.fillRect(x + 8, y, 4, 10);
  };
  drawMiniTank(130, H/2 - 20, true);
  drawMiniTank(W - 150, H/2 - 20, false);

  // Instructions box
  const boxX = 90, boxY = H/2 - 10, boxW = W - 180, boxH = 140;
  ctx.fillStyle = 'rgba(15,52,96,0.6)';
  ctx.strokeStyle = 'rgba(168,216,234,0.2)';
  ctx.lineWidth = 1;
  ctx.fillRect(boxX, boxY, boxW, boxH);
  ctx.strokeRect(boxX, boxY, boxW, boxH);

  ctx.font = '15px "Microsoft YaHei", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const instructions = [
    { text: '↑ ↓ ← →   移动坦克', color: '#a8d8ea' },
    { text: '空格键      发射炮弹', color: '#a8d8ea' },
    { text: 'P 键          暂停游戏', color: '#a8d8ea' },
    { text: '消灭全部 20 辆敌军坦克即可获胜', color: '#ffd700' },
  ];
  instructions.forEach((item, i) => {
    ctx.fillStyle = item.color;
    ctx.fillText(item.text, W/2, boxY + 28 + i * 28);
  });

  // Start prompt
  const pulse = Math.sin(Date.now() / 300) * 0.3 + 0.7;
  ctx.globalAlpha = pulse;
  ctx.font = 'bold 22px "Microsoft YaHei", sans-serif';
  ctx.fillStyle = '#ffd700';
  ctx.fillText('按 空格键 或 点击 开始游戏', W/2, H - 55);
  ctx.globalAlpha = 1;
}

// ============================================================
//  INPUT
// ============================================================

// Block space scrolling at capture phase (works even if page loses focus)
window.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Space' || e.keyCode === 32) {
    e.preventDefault(); // stop scrolling — let event continue to document listener
  }
}, { capture: true, passive: false });

document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (!gameStarted && !gameOver) {
    if (e.key === ' ' || e.key === 'Space' || e.key === 'Enter') {
      startGame();
    }
    return;
  }
  if (e.key === 'p' || e.key === 'P') {
    if (!gameOver && !gameWin) gamePaused = !gamePaused;
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.key] = false;
});

// Prevent right-click context menu on game area
canvas.addEventListener('contextmenu', (e) => e.preventDefault());

// Click or tap canvas to start
canvas.addEventListener('click', () => {
  if (!gameStarted && !gameOver) startGame();
});
canvas.addEventListener('touchstart', () => {
  if (!gameStarted && !gameOver) startGame();
});

document.getElementById('restartBtn').addEventListener('click', resetGame);

// ============================================================
//  GAME LOOP
// ============================================================
function update() {
  if (gameOver || gameWin || gamePaused || !gameStarted) return;

  frameCount++;

  // Player input
  if (player && player.alive) {
    let moved = false;
    if (keys['ArrowUp']) { player.move(DIR.UP); moved = true; }
    else if (keys['ArrowDown']) { player.move(DIR.DOWN); moved = true; }
    else if (keys['ArrowLeft']) { player.move(DIR.LEFT); moved = true; }
    else if (keys['ArrowRight']) { player.move(DIR.RIGHT); moved = true; }

    if (keys[' '] || keys['Space']) {
      player.shoot();
    }
    player.update();
  }

  // Enemy AI
  for (const e of enemies) {
    updateEnemyAI(e);
    e.update();
  }

  // Remove dead enemies
  enemies = enemies.filter(e => e.alive);

  // Bullets
  for (const b of bullets) {
    b.update();
  }
  bullets = bullets.filter(b => b.alive);

  // Effects
  updateEffects(explosions);
  updateEffects(particles);

  // Spawn enemies
  if (enemiesRemaining > 0 && enemies.length < MAX_ENEMIES && !gameOver) {
    spawnTimer--;
    if (spawnTimer <= 0) {
      spawnEnemy();
      spawnTimer = SPAWN_DELAY;
    }
  } else if (enemiesRemaining <= 0 && enemies.length === 0 && !gameOver) {
    triggerWin();
  }

  updateUI();
}

function draw() {
  // Clear
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);

  // Start screen — full custom draw
  if (!gameStarted) {
    drawStartScreen();
    return;
  }

  // Map
  drawMap();

  // Effects (behind tanks)
  drawEffects(particles);

  // Bullets
  for (const b of bullets) {
    b.draw();
  }

  // Tanks (player behind enemies for better visibility)
  for (const e of enemies) {
    e.draw();
  }
  if (player) player.draw();

  // Explosions
  drawEffects(explosions);

  // Draw grid dots (subtle)
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.fillRect(c * CELL + 1, r * CELL + 1, 1, 1);
    }
  }

  drawHUD();

  // Overlays
  if (gameOver) drawGameOver();
  else if (gameWin) drawWin();
  else if (gamePaused) drawPause();
}

function gameLoop() {
  try {
    update();
    draw();
  } catch (e) {
    console.error('Game error:', e);
    // Don't freeze — keep the loop running
  }
  requestAnimationFrame(gameLoop);
}

// ============================================================
//  START GAME
// ============================================================
resetGame();
gameLoop();

</script>
